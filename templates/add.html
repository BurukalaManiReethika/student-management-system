
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h2>Add Student</h2>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Student Name"
           required>

    <input type="number"
           name="age"
           placeholder="Age"
           required>

    <input type="text"
           name="course"
           placeholder="Course"
           required>

    <button type="submit">Save Student</button>

</form>

<br>

<a href="/">Back</a>

</body>
</html>
