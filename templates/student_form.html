{% extends "base.html" %}

{% block title %}
{{ action }} Student
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm">

            <div class="card-header">

                <h4 class="mb-0">
                    {{ action }} Student
                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   value="{{ student.name if student else '' }}"
                                   required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   value="{{ student.email if student else '' }}"
                                   required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Age
                            </label>

                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   value="{{ student.age if student else '' }}">

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <select name="gender"
                                    class="form-select">

                                <option value="Male"
                                {% if student and student.gender=='Male' %}
                                selected
                                {% endif %}
                                >
                                    Male
                                </option>

                                <option value="Female"
                                {% if student and student.gender=='Female' %}
                                selected
                                {% endif %}
                                >
                                    Female
                                </option>

                            </select>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Marks
                            </label>

                            <input type="number"
                                   name="marks"
                                   class="form-control"
                                   value="{{ student.marks if student else '' }}"
                                   required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Course
                        </label>

                        <select name="course"
                                class="form-select"
                                required>

                            {% for course in courses %}

                            <option value="{{ course }}"
                            {% if student and student.course==course %}
                            selected
                            {% endif %}
                            >
                                {{ course }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input type="text"
                               name="phone"
                               class="form-control"
                               value="{{ student.phone if student else '' }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Date of Birth
                        </label>

                        <input type="date"
                               name="dob"
                               class="form-control"
                               value="{{ student.dob if student else '' }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <textarea name="address"
                                  rows="4"
                                  class="form-control">{{ student.address if student else '' }}</textarea>

                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit"
                                class="btn btn-success">

                            Save Student

                        </button>

                        <a href="{{ url_for('students') }}"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
