{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-success text-white">
<h3>Add Student</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input
type="text"
name="name"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input
type="email"
name="email"
class="form-control"
required>
</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">
<label>Age</label>
<input
type="number"
name="age"
class="form-control"
required>
</div>

<div class="col-md-4 mb-3">
<label>Course</label>
<input
type="text"
name="course"
class="form-control"
required>
</div>

<div class="col-md-4 mb-3">
<label>Marks</label>
<input
type="number"
name="marks"
class="form-control"
required>
</div>

</div>

<button
type="submit"
class="btn btn-success">
Add Student
</button>

<a href="/"
class="btn btn-secondary">
Back
</a>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
